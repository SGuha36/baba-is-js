<!DOCTYPE html>
<html>
<head>
  <title>Baba Is JS</title>
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: #15181f;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  </style>
</head>
<body>
<canvas id="game" style="background: #080808"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d'); // Your canvas 2D context

const spritesheets = {
  characters: new Image(),
  statics: new Image(),
  tiles: new Image()
};

spritesheets.characters.src = "spritesheetCharacters.png";
spritesheets.statics.src = "spritesheetStatics.png";
spritesheets.tiles.src = "spritesheetTiles.png";

const assetPositions = {
  "BABA": {sheet: spritesheets.characters, col: 576, row: 1},
  "WALL": {sheet: spritesheets.tiles, col: 476, row: 1501},
  "ROCK": {sheet: spritesheets.statics, col: 226, row: 601},
  "FLAG": {sheet: spritesheets.statics, col: 101, row: 226},
  "TILE": {sheet: spritesheets.statics, col: 226, row: 751},
  // ...add more as needed
};

const levelData = {
  1: {width: 33, height: 18},
  // ...add more as needed
};

const gameObjects = [
  { type: "TILE", x: 12, y: 10 },
  { type: "TILE", x: 13, y: 10 },
  { type: "TILE", x: 14, y: 10 },
  { type: "TILE", x: 15, y: 10 },
  { type: "TILE", x: 16, y: 10 },
  { type: "TILE", x: 17, y: 10 },
  { type: "TILE", x: 18, y: 10 },
  { type: "TILE", x: 19, y: 10 },
  { type: "TILE", x: 20, y: 10 },
  { type: "TILE", x: 21, y: 10 },
  { type: "TILE", x: 22, y: 10 },
  { type: "TILE", x: 12, y: 11 },
  { type: "TILE", x: 13, y: 11 },
  { type: "TILE", x: 14, y: 11 },
  { type: "TILE", x: 15, y: 11 },
  { type: "TILE", x: 16, y: 11 },
  { type: "TILE", x: 17, y: 11 },
  { type: "TILE", x: 18, y: 11 },
  { type: "TILE", x: 19, y: 11 },
  { type: "TILE", x: 20, y: 11 },
  { type: "TILE", x: 21, y: 11 },
  { type: "TILE", x: 22, y: 11 },
  { type: "TILE", x: 12, y: 12 },
  { type: "TILE", x: 13, y: 12 },
  { type: "TILE", x: 14, y: 12 },
  { type: "TILE", x: 15, y: 12 },
  { type: "TILE", x: 16, y: 12 },
  { type: "TILE", x: 17, y: 12 },
  { type: "TILE", x: 18, y: 12 },
  { type: "TILE", x: 19, y: 12 },
  { type: "TILE", x: 20, y: 12 },
  { type: "TILE", x: 21, y: 12 },
  { type: "TILE", x: 22, y: 12 },
  { type: "WALL", x: 12, y: 9  },
  { type: "WALL", x: 13, y: 9  },
  { type: "WALL", x: 14, y: 9  },
  { type: "WALL", x: 15, y: 9  },
  { type: "WALL", x: 16, y: 9  },
  { type: "WALL", x: 17, y: 9  },
  { type: "WALL", x: 18, y: 9  },
  { type: "WALL", x: 19, y: 9  },
  { type: "WALL", x: 20, y: 9  },
  { type: "WALL", x: 21, y: 9  },
  { type: "WALL", x: 22, y: 9  },
  { type: "WALL", x: 12, y: 13 },
  { type: "WALL", x: 13, y: 13 },
  { type: "WALL", x: 14, y: 13 },
  { type: "WALL", x: 15, y: 13 },
  { type: "WALL", x: 16, y: 13 },
  { type: "WALL", x: 17, y: 13 },
  { type: "WALL", x: 18, y: 13 },
  { type: "WALL", x: 19, y: 13 },
  { type: "WALL", x: 20, y: 13 },
  { type: "WALL", x: 21, y: 13 },
  { type: "WALL", x: 22, y: 13 },
  { type: "ROCK", x: 17, y: 10 },
  { type: "ROCK", x: 17, y: 11 },
  { type: "ROCK", x: 17, y: 12 },
  { type: "FLAG", x: 21, y: 11 },
  { type: "BABA", x: 13, y: 11 }
  // etc.
];

gameObjects.forEach((obj) => {
  obj.frameSeed = Math.floor(Math.random() * 3);
  obj.state = 0
  obj.lastx = obj.x
  obj.lasty = obj.y
});

function connectTiles() {
  gameObjects.forEach((obj) => {
    if (assetPositions[obj.type].sheet === spritesheets.tiles) {
	  obj.state = 0
	  if (gameObjects.find((oth) => (obj.x === levelData[1].width || (oth.type === obj.type && oth.x === obj.x + 1 && oth.y === obj.y)))) {
	    obj.state += 1
	  }
      if (gameObjects.find((oth) => (obj.y === 1 || (oth.type === obj.type && oth.y === obj.y - 1 && oth.x === obj.x)))) {
	    obj.state += 2
	  }
	  if (gameObjects.find((oth) => (obj.x === 1 || (oth.type === obj.type && oth.x === obj.x - 1 && oth.y === obj.y)))) {
	    obj.state += 4
	  }
	  if (gameObjects.find((oth) => (obj.y === levelData[1].height || (oth.type === obj.type && oth.y === obj.y + 1 && oth.x === obj.x)))) {
	    obj.state += 8
	  }
    }
  });
}

function drawAsset(ctx, assetName, x, y, frameIndex = 0, spriteState = 0) {
  const asset = assetPositions[assetName];
  const sheet = asset.sheet;

  const size = 24;
  ctx.drawImage(
    sheet,
    asset.col + (size + 1) * spriteState, asset.row + (size + 1) * frameIndex,
    size, size,
    (x - 1) * (canvas.width / levelData[1].width), (y - 1) * (canvas.height / levelData[1].height),
    canvas.width / levelData[1].width, canvas.height / levelData[1].height
  );
}

var everythingLoaded = false

function loadSpritesheets(callback) {
  if (everythingLoaded === true) {
    callback();
  } else {
    let loaded = 0
    const total = Object.keys(spritesheets).length;
    for (const key in spritesheets) {
      spritesheets[key].onload = () => {
        loaded++;
        if (loaded === total) 
	      everythingLoaded = true;
		  callback();
      };
    }
  }
}

function drawScene() {
  ctx.fillStyle = "#080808";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let realProg = 1;
  if (animatingS) {
    realProg = (prog / animationSpeedS)
	realProg = 1 - (1 - realProg) * (1 - realProg)
  }
  
  // Draw each game object
  for (const obj of gameObjects) {
    x = (obj.x * realProg) + (obj.lastx * (1 - realProg));
    y = (obj.y * realProg) + (obj.lasty * (1 - realProg));
    drawAsset(ctx, obj.type, x, y, (animationFrame + obj.frameSeed) % 3, obj.state);
  }
}

// Function to resize canvas to window size
function resizeCanvas() {
  marginSize = 88
  aspectRatio = levelData[1].width / levelData[1].height
  canvas.height = ((window.innerHeight - marginSize) * aspectRatio > window.innerWidth - marginSize) ? (window.innerWidth - marginSize) / aspectRatio: window.innerHeight - marginSize;
  canvas.width = canvas.height * aspectRatio;
  if (window.innerHeight < marginSize)
	canvas.height = ((window.innerHeight) * aspectRatio > window.innerWidth) ? (window.innerWidth) / aspectRatio: window.innerHeight;
	canvas.width = canvas.height * aspectRatio;
  loadSpritesheets(() => {
    ctx.imageSmoothingEnabled = false;
    drawScene();
  });
}

const animationSpeed = 150; // ms per frame
let animationFrame = 0;
let lastFrameTime = 0;

const animationSpeedS = 100;
let animatingS = false;
let lastFrameTimeS = 0;
let prog = 0;

function animate(time) {
  if (time - lastFrameTime > animationSpeed) {
    animationFrame++;
    lastFrameTime = time;
  }
  if (animatingS) {
	if (time - lastFrameTimeS > animationSpeedS) {
	  animatingS = false;
	}
  } else {
    lastFrameTimeS = time
  }
  prog = time - lastFrameTimeS;
  
  drawScene();

  requestAnimationFrame(animate);
}

// Initial tile connection
connectTiles();
// Initial resize
resizeCanvas();

requestAnimationFrame(animate);

// Listen for window resize
window.addEventListener('resize', resizeCanvas);

window.addEventListener('keydown', function(event) {
  if (event.repeat || prog != 0) return; // Ignore auto-repeats and when animating smooth movement
  for (const obj of gameObjects) {
    if (obj.type === "BABA") {
	  let arrowKeyPressed = event.key.startsWith("Arrow");
	  if (arrowKeyPressed) {
	    obj.lastx = obj.x;
		obj.lasty = obj.y;
	  }
      switch(event.key) {
        case 'ArrowRight': if (obj.x != levelData[1].width)  {obj.x += 1;} break;
		case 'ArrowUp':    if (obj.y != 1)                   {obj.y -= 1;} break;
        case 'ArrowLeft':  if (obj.x != 1)                   {obj.x -= 1;} break;
        case 'ArrowDown':  if (obj.y != levelData[1].height) {obj.y += 1;} break;
      }
	  if (arrowKeyPressed) {
	    animatingS = true;
	  }
	  if (assetPositions[obj.type].sheet === spritesheets.characters) {
		switch(event.key) {
          case 'ArrowRight': obj.state = ((obj.state + 1) % 4);      break;
		  case 'ArrowUp'   : obj.state = ((obj.state + 1) % 4) + 4;  break;
          case 'ArrowLeft' : obj.state = ((obj.state + 1) % 4) + 8;  break;
          case 'ArrowDown' : obj.state = ((obj.state + 1) % 4) + 12; break;
        }
	  }
    }
  }
  connectTiles();
});
</script>
</body>
</html>
